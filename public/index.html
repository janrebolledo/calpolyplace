<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cal poly place</title>
    <link rel="stylesheet" href="tailwindcss" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="manifest" href="./site.webmanifest" />
  </head>
  <body class="bg-[#B8121E]">
    <main class="min-h-svh max-h-svh overflow-hidden text-white">
      <div class="mx-auto max-w-md px-4">
        <header class="flex justify-center p-12">
          <img
            src="assets/calpolyplace.png"
            alt="Cal Poly Place"
            class="w-60"
          />
        </header>

        <section
          class="flex w-full items-center justify-center rounded-4xl bg-radial from-[#B01116] to-[#A60B14] p-2"
        >
          <div
            id="canvas-bg"
            class="shadow-[inset_0px_4px_5px_5px_rgba(0,0,0,0.25)] rounded-3xl"
          >
            <canvas
              id="canvas"
              class="h-full w-full"
              style="
                mask-image: url(&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><filter id='b'><feGaussianBlur stdDeviation='1.5'/></filter></defs><rect x='2' y='2' width='96' height='96' rx='8' fill='white' filter='url(%23b)'/></svg>&quot;);
                -webkit-mask-image: url(&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><filter id='b'><feGaussianBlur stdDeviation='1.5'/></filter></defs><rect x='2' y='2' width='96' height='96' rx='8' fill='white' filter='url(%23b)'/></svg>&quot;);
                mask-size: 100% 100%;
                -webkit-mask-size: 100% 100%;
              "
            ></canvas>
          </div>
        </section>

        <section class="flex justify-center gap-12 p-8">
          <div class="flex flex-col items-center gap-4">
            <div class="relative">
              <div
                class="absolute top-0 left-0 grid h-full w-full grid-cols-3 grid-rows-3 items-center justify-center select-none touch-none"
              >
                <!-- up -->
                <button
                  class="col-start-2 h-10 w-10 rounded-xl"
                  onpointerdown="startRepeat(event, 0, -1)"
                ></button>
                <!-- left -->
                <button
                  class="col-start-1 row-start-2 h-10 w-10 rounded-xl"
                  onpointerdown="startRepeat(event, -1, 0)"
                ></button>
                <!-- right -->
                <button
                  class="col-start-3 row-start-2 h-10 w-10 rounded-xl"
                  onpointerdown="startRepeat(event, 1, 0)"
                ></button>
                <!-- down -->
                <button
                  class="col-start-2 row-start-3 h-10 w-10 rounded-xl"
                  onpointerdown="startRepeat(event, 0, 1)"
                ></button>
              </div>
              <img src="assets/dpad.svg" alt="DPAD" class="w-30" />
            </div>
            <p class="text-white/50">move</p>
          </div>

          <div class="my-auto flex flex-col items-center gap-4">
            <button onclick="toggleDrawing()">
              <img src="assets/button.svg" alt="Button" class="w-10" />
            </button>
            <p id="draw-label" class="text-white/50">start drawing</p>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
