<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cal poly place</title>
    <link rel="stylesheet" href="tailwindcss" />
  </head>
  <body>
    <main class="min-h-screen bg-[#B8121E] text-white">
      <div class="mx-auto max-w-md px-4">
        <header class="flex justify-center p-12">
          <img
            src="assets/calpolyplace.png"
            alt="Cal Poly Place"
            class="w-60"
          />
        </header>

        <section
          class="flex h-110 w-full items-center justify-center rounded-4xl bg-radial from-[#B01116] to-[#A60B14] p-2"
        >
          <canvas
            id="canvas"
            class="h-full w-full rounded-3xl bg-white shadow-[inset_0px_4px_5px_5px_rgba(0,0,0,0.25)]"
          ></canvas>
        </section>

        <section class="flex justify-center gap-12 p-12">
          <div class="flex flex-col items-center gap-4">
            <div class="relative">
              <div
                class="absolute top-0 left-0 grid h-full w-full grid-cols-3 grid-rows-3 items-center justify-center"
              >
                <!-- up -->
                <button
                  class="col-start-2 h-10 w-10 rounded-xl"
                  onclick="moveCursor(0, -1)"
                ></button>
                <!-- left -->
                <button
                  class="col-start-1 row-start-2 h-10 w-10 rounded-xl"
                  onclick="moveCursor(-1, 0)"
                ></button>
                <!-- right -->
                <button
                  class="col-start-3 row-start-2 h-10 w-10 rounded-xl"
                  onclick="moveCursor(1, 0)"
                ></button>
                <!-- down -->
                <button
                  class="col-start-2 row-start-3 h-10 w-10 rounded-xl"
                  onclick="moveCursor(0, 1)"
                ></button>
              </div>
              <img src="assets/dpad.svg" alt="DPAD" class="w-30" />
            </div>
            <p class="text-white/50">move</p>
          </div>

          <div class="my-auto flex flex-col items-center gap-4">
            <button onclick="toggleDrawing()">
              <img src="assets/button.svg" alt="Button" class="w-10" />
            </button>
            <p class="text-white/50">start</p>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="script.js"></script>
  </body>
</html>
